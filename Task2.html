<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .title-badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #f90;
            background: rgba(255, 153, 0, 0.12);
            border: 1px solid rgba(255, 153, 0, 0.3);
            padding: 5px 16px;
            border-radius: 20px;
            margin-bottom: 14px;
        }

        h2 {
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #fff 0%, #f90 60%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-bottom: 36px;
        }

        /* ── Score board ── */
        .scoreboard {
            display: flex;
            gap: 16px;
            margin-bottom: 36px;
        }

        .score-box {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 14px 30px;
            min-width: 100px;
        }

        .score-box .label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 4px;
        }

        .score-box .number {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .score-box.wins   .number { color: #00e676; }
        .score-box.losses .number { color: #ff5252; }
        .score-box.draws  .number { color: #f90; }

        /* ── Choices ── */
        .choices {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 36px;
            flex-wrap: wrap;
        }

        .choice-btn {
            width: 150px;
            height: 150px;
            border: 3px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            position: relative;
            outline: none;
        }

        .choice-btn::after {
            content: attr(data-label);
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
        }

        .choice-btn:hover {
            transform: scale(1.12) translateY(-6px);
        }

        #rock {
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS_NZ_p1RRChn-mUz1d7RGLTwe23ynDuB6lHQ&s");
            box-shadow: 0 0 0 4px rgba(255,100,100,0.25), 0 12px 30px rgba(255,100,100,0.2);
        }
        #rock:hover { box-shadow: 0 0 0 4px rgba(255,100,100,0.6), 0 20px 40px rgba(255,100,100,0.35); border-color: #ff6464; }

        #paper {
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRl5FdAC8ab-B6fM-m3j5ksCDCY1JIBMDwfig&s");
            box-shadow: 0 0 0 4px rgba(100,180,255,0.25), 0 12px 30px rgba(100,180,255,0.2);
        }
        #paper:hover { box-shadow: 0 0 0 4px rgba(100,180,255,0.6), 0 20px 40px rgba(100,180,255,0.35); border-color: #64b4ff; }

        #scissor {
            background-image: url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRvN271EiXr9ALI6YecRkTHOHSMqT-2BmDbWw&s");
            box-shadow: 0 0 0 4px rgba(255,200,50,0.25), 0 12px 30px rgba(255,200,50,0.2);
        }
        #scissor:hover { box-shadow: 0 0 0 4px rgba(255,200,50,0.6), 0 20px 40px rgba(255,200,50,0.35); border-color: #ffc832; }

        /* ── Result card ── */
        .result-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 18px;
            padding: 20px 40px;
            min-width: 320px;
            font-size: 1.1rem;
            font-weight: 600;
            color: rgba(255,255,255,0.85);
            transition: all 0.3s;
            min-height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .result-card.win  { border-color: rgba(0,230,118,0.5); background: rgba(0,230,118,0.08); color: #00e676; }
        .result-card.lose { border-color: rgba(255,82,82,0.5);  background: rgba(255,82,82,0.08);  color: #ff5252; }
        .result-card.draw { border-color: rgba(255,153,0,0.5);  background: rgba(255,153,0,0.08);  color: #f90; }

        /* ── Reset button ── */
        .reset-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.5);
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 600;
            padding: 8px 22px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            width: auto;
            height: auto;
            letter-spacing: 0.05em;
        }

        .reset-btn:hover {
            border-color: #f90;
            color: #f90;
            transform: none;
            box-shadow: none;
        }

        @keyframes pop {
            0%   { transform: scale(0.9); opacity: 0; }
            60%  { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .pop { animation: pop 0.3s ease forwards; }
    </style>
</head>
<body>
    <div class="title-badge">✦ Mini Game</div>
    <h2>Rock Paper Scissors</h2>
    <p class="subtitle">Pick your move — beat the computer</p>

    <div class="scoreboard">
        <div class="score-box wins">
            <div class="label">Wins</div>
            <div class="number" id="wins">0</div>
        </div>
        <div class="score-box draws">
            <div class="label">Draws</div>
            <div class="number" id="draws">0</div>
        </div>
        <div class="score-box losses">
            <div class="label">Losses</div>
            <div class="number" id="losses">0</div>
        </div>
    </div>

    <div class="choices">
        <button class="choice-btn" id="rock"    data-label="Rock"     onclick="play('rock')"></button>
        <button class="choice-btn" id="paper"   data-label="Paper"    onclick="play('paper')"></button>
        <button class="choice-btn" id="scissor" data-label="Scissors" onclick="play('scissor')"></button>
    </div>

    <div class="result-card" id="result">Choose your move above ☝️</div>

    <button class="reset-btn" onclick="resetScore()">↺ Reset Score</button>

    <script>
        let wins = 0, draws = 0, losses = 0;

        function play(user) {
            const choices = ["rock", "paper", "scissor"];
            const comp = choices[Math.floor(Math.random() * 3)];
            const resultEl = document.getElementById("result");
            const compLabel = comp.charAt(0).toUpperCase() + comp.slice(1);

            resultEl.classList.remove("win", "lose", "draw", "pop");
            void resultEl.offsetWidth;

            if (comp === user) {
                draws++;
                document.getElementById("draws").textContent = draws;
                resultEl.className = "result-card draw pop";
                resultEl.innerHTML = `🤝 Draw! Computer also picked <strong>${compLabel}</strong>`;
            } else if (
                (user === "rock"    && comp === "scissor") ||
                (user === "paper"   && comp === "rock")    ||
                (user === "scissor" && comp === "paper")
            ) {
                wins++;
                document.getElementById("wins").textContent = wins;
                resultEl.className = "result-card win pop";
                resultEl.innerHTML = `🎉 You win! Computer picked <strong>${compLabel}</strong>`;
            } else {
                losses++;
                document.getElementById("losses").textContent = losses;
                resultEl.className = "result-card lose pop";
                resultEl.innerHTML = `😞 You lose! Computer picked <strong>${compLabel}</strong>`;
            }
        }

        function resetScore() {
            wins = draws = losses = 0;
            document.getElementById("wins").textContent    = 0;
            document.getElementById("draws").textContent   = 0;
            document.getElementById("losses").textContent  = 0;
            const resultEl = document.getElementById("result");
            resultEl.className = "result-card";
            resultEl.innerHTML = "Choose your move above ☝️";
        }
    </script>
</body>
</html>
